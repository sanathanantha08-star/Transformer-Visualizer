<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transformer Explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
  --border:rgba(139,92,246,.18);--border2:rgba(255,255,255,.07);
  --purple:#8b5cf6;--purple-dim:#4c1d95;--purple-bright:#a78bfa;
  --red:#ef4444;--blue:#63b3ed;--green:#34d399;--orange:#f6ad55;
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
button{font-family:var(--sans)}
select,input{font-family:var(--sans)}

/* ── App Shell ── */
.app{
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(139,92,246,.12) 0%,transparent 60%),
    linear-gradient(rgba(139,92,246,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,92,246,.03) 1px,transparent 1px);
  background-size:auto,40px 40px,40px 40px;
}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:10px 20px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.brand-icon{font-size:1.3rem;color:var(--purple-bright);animation:spin 8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-text{font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--purple-bright);letter-spacing:.08em;white-space:nowrap}

.controls-center{flex:1;display:flex;align-items:center;gap:10px;min-width:220px}
.example-select{
  background:var(--bg3);color:var(--text);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;font-size:.82rem;cursor:pointer;outline:none;
  transition:border-color .2s;max-width:260px;width:100%
}
.example-select:hover,.example-select:focus{border-color:var(--purple)}
.predicted-badge{
  background:rgba(139,92,246,.15);border:1px solid var(--border);
  border-radius:8px;padding:5px 12px;font-family:var(--mono);font-size:.75rem;
  color:var(--purple-bright);white-space:nowrap;flex-shrink:0
}

.controls-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-dim)}
input[type=range]{width:70px;accent-color:var(--purple);cursor:pointer}
.ctrl-val{font-family:var(--mono);color:var(--text);min-width:24px}
.radio-row{display:flex;gap:8px}
.radio-row label{display:flex;align-items:center;gap:3px;cursor:pointer;color:var(--text)}
.radio-row input[type=radio]{accent-color:var(--purple)}
.num-in{
  width:40px;background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;color:var(--text);padding:2px 4px;
  font-family:var(--mono);font-size:.78rem;text-align:center
}
.icon-btn{
  background:none;border:1px solid var(--border);color:var(--text-muted);
  border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.icon-btn:hover{border-color:var(--purple);color:var(--purple-bright)}

/* ── Canvas ── */
.canvas{
  display:flex;align-items:flex-start;gap:0;
  padding:20px 16px 30px;overflow-x:auto;
  min-height:calc(100vh - 56px);
}
.canvas::-webkit-scrollbar{height:5px}
.canvas::-webkit-scrollbar-track{background:var(--bg)}
.canvas::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:4px}

/* ── Token Column ── */
.token-col{display:flex;flex-direction:column;gap:4px;padding-top:38px;flex-shrink:0;min-width:60px}
.col-hdr{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;font-family:var(--mono)}
.token-lbl{height:36px;display:flex;align-items:center;font-family:var(--mono);font-size:.78rem;color:var(--text-dim);padding:0 6px}

/* ── Stage ── */
.stage{display:flex;flex-direction:column;flex-shrink:0}
.s-label{
  font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);
  margin-bottom:5px;font-family:var(--mono);cursor:pointer;display:flex;align-items:center;gap:4px
}
.s-label:hover{color:var(--purple-bright)}
.ib{
  display:inline-flex;align-items:center;justify-content:center;
  width:15px;height:15px;border-radius:50%;border:1px solid var(--border);
  font-size:.6rem;color:var(--text-muted);cursor:pointer;transition:all .2s
}
.s-label:hover .ib{border-color:var(--purple);color:var(--purple-bright)}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;transition:border-color .3s}
.panel:hover{border-color:rgba(139,92,246,.4)}
.p-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border2)}
.p-icon{font-size:.9rem;color:var(--purple-bright)}
.p-title{font-weight:600;font-size:.82rem;color:var(--text);flex:1}
.p-info{font-size:.66rem;color:var(--text-muted);font-family:var(--mono)}
.p-foot{margin-top:7px;font-size:.65rem;color:var(--text-muted);font-family:var(--mono);text-align:right}

/* ── Token rows ── */
.tok-row{display:flex;align-items:center;gap:7px;height:36px}
.tok-chip{
  background:rgba(139,92,246,.12);border:1px solid var(--border);border-radius:5px;
  padding:2px 6px;font-family:var(--mono);font-size:.68rem;color:var(--purple-bright);
  white-space:nowrap;flex-shrink:0;min-width:52px;text-align:center
}
.tok-chip.sm{min-width:38px;font-size:.62rem}

/* ── Vector cells ── */
.v-cells{display:flex;gap:2px}
.v-cell{
  width:15px;height:20px;border-radius:3px;
  transition:background .5s;cursor:default;flex-shrink:0
}
.v-cell.sm{width:11px;height:15px}
.v-cell.exp{width:7px}

/* ── SVG Flow ── */
.flow-svg{overflow:visible;flex-shrink:0}
.flow-path{stroke-dasharray:6 4;animation:dash 1.4s linear infinite}
@keyframes dash{to{stroke-dashoffset:-20}}
.flow-dot{filter:drop-shadow(0 0 4px #8b5cf6)}

/* ── Embedding ── */
.emb-panel{min-width:200px}
.emb-content{display:flex;flex-direction:column;gap:4px}

/* ── Block wrap ── */
.blk-wrap{display:flex;flex-direction:column;min-width:520px;flex-shrink:0}
.blk-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.blk-title{font-family:var(--mono);font-size:.82rem;color:var(--purple-bright);font-weight:700}
.nav-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);
  border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.nav-btn:hover{border-color:var(--purple);color:var(--purple-bright)}

.blk-inner{display:flex;gap:8px;align-items:stretch}
.res-track{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0}
.res-tag{
  font-size:.58rem;font-family:var(--mono);color:var(--text-muted);
  writing-mode:vertical-rl;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px
}
.res-line{
  flex:1;width:2px;
  background:linear-gradient(180deg,var(--purple) 0%,transparent 100%);
  border-radius:2px;position:relative
}
.res-line::after{
  content:'';position:absolute;top:0;left:-3px;width:8px;height:8px;
  border-radius:50%;background:var(--purple);animation:pulse 2s ease-in-out infinite
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.attn-mlp-stack{flex:1;display:flex;flex-direction:column;gap:12px}

/* ── Block Badge ── */
.blk-badge{
  margin-top:10px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:12px
}
.blk-num{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--purple-bright);min-width:22px}
.blk-lbl{font-size:.68rem;color:var(--text-muted)}
.blk-dots{display:flex;gap:3px;flex-wrap:wrap;max-width:120px}
.blk-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--bg4);border:1px solid var(--border);transition:all .3s
}
.blk-dot.on{background:var(--purple);border-color:var(--purple-bright);box-shadow:0 0 6px rgba(139,92,246,.6)}

/* ── View Tabs ── */
.vtabs{display:flex;gap:5px;margin-bottom:8px}
.vtab{
  flex:1;padding:4px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text-muted);font-size:.72rem;cursor:pointer;transition:all .2s
}
.vtab.on{background:rgba(139,92,246,.2);border-color:var(--purple);color:var(--purple-bright)}

/* ── Head Nav ── */
.head-nav{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-dim);font-family:var(--mono)}
.head-nav button{
  background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);
  border-radius:4px;width:20px;height:20px;cursor:pointer;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.head-nav button:hover{border-color:var(--purple);color:var(--purple-bright)}

/* ── Attention Matrix ── */
.attn-panel{min-width:270px}
.attn-mat{overflow-x:auto}
.attn-col-labels{display:flex;margin-bottom:2px}
.attn-corner{width:50px;flex-shrink:0}
.attn-cl{width:30px;flex-shrink:0;text-align:center;font-size:.58rem;color:var(--text-muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis}
.attn-row-wrap{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.attn-rl{width:50px;flex-shrink:0;font-size:.62rem;color:var(--text-dim);font-family:var(--mono);text-align:right;padding-right:5px;overflow:hidden;text-overflow:ellipsis}
.attn-cell{
  width:30px;height:26px;border-radius:3px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.58rem;color:rgba(255,255,255,.75);font-family:var(--mono);
  transition:background .4s;cursor:default
}

/* ── QKV view ── */
.qkv-view{display:flex;flex-direction:column;gap:8px}
.qkv-lbl{
  font-size:.68rem;font-family:var(--mono);font-weight:700;
  margin-bottom:3px;padding:2px 5px;border-radius:4px;display:inline-block
}
.q-lbl{color:#f87171;background:rgba(239,68,68,.1)}
.k-lbl{color:#34d399;background:rgba(52,211,153,.1)}
.v-lbl{color:#63b3ed;background:rgba(99,179,237,.1)}

/* ── MLP Panel ── */
.mlp-panel{min-width:220px}
.phase-badge{font-size:.65rem;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:var(--bg3);border:1px solid var(--border)}
.ph0{color:#63b3ed;border-color:rgba(99,179,237,.3)}
.ph1{color:#f6ad55;border-color:rgba(246,173,85,.3)}
.ph2{color:#34d399;border-color:rgba(52,211,153,.3)}
.mlp-dims{display:flex;gap:4px;margin-top:7px;justify-content:center}
.dim-b{font-size:.62rem;font-family:var(--mono);padding:2px 5px;border-radius:4px;border:1px solid var(--border);color:var(--text-muted);transition:all .4s}
.dim-b.on{border-color:var(--purple);color:var(--purple-bright);background:rgba(139,92,246,.15)}

/* ── Output Panel ── */
.out-panel{min-width:220px}
.out-list{display:flex;flex-direction:column;gap:3px}
.out-row{display:flex;align-items:center;gap:7px;padding:2px 0;border-radius:4px;transition:background .2s}
.out-row.top-r{background:rgba(139,92,246,.07)}
.out-tok{min-width:76px;font-family:var(--mono);font-size:.72rem;text-align:right}
.out-bar-wrap{flex:1;height:14px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.out-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);min-width:2px}
.out-pct{min-width:44px;font-family:var(--mono);font-size:.68rem;color:var(--text-dim);text-align:right}
.top-pred-box{
  margin-top:9px;padding:7px 10px;background:rgba(139,92,246,.12);
  border:1px solid var(--border);border-radius:8px;font-size:.78rem;text-align:center;color:var(--text-dim)
}
.top-pred-box strong{color:var(--purple-bright);font-family:var(--mono)}

/* ── Remaining blocks row ── */
.rem-row{padding:0 16px 28px;display:flex;justify-content:center}
.rem-card{
  background:var(--bg2);border:1px dashed var(--border);border-radius:12px;
  padding:12px 20px;text-align:center;max-width:380px
}
.rem-title{font-size:.82rem;color:var(--purple-bright);font-family:var(--mono);margin-bottom:3px}
.rem-sub{font-size:.72rem;color:var(--text-muted);margin-bottom:8px}
.rem-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.rem-dot{width:9px;height:9px;border-radius:50%;background:var(--purple);opacity:.3;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.2;transform:scale(.85)}50%{opacity:.7;transform:scale(1.1)}}

/* ── Overlay / Info Drawer ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)
}
.drawer-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:26px;max-width:440px;width:90%;position:relative;
  box-shadow:0 0 60px rgba(139,92,246,.2)
}
.drawer-close{
  position:absolute;top:13px;right:13px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text-muted);border-radius:6px;width:26px;height:26px;cursor:pointer;
  font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .2s
}
.drawer-close:hover{color:var(--text);border-color:var(--purple)}
.drawer-card h3{font-size:1rem;font-family:var(--mono);color:var(--purple-bright);margin-bottom:10px}
.drawer-card h4{font-size:.82rem;color:var(--text-dim);margin:12px 0 5px}
.drawer-card p{font-size:.82rem;color:var(--text-dim);line-height:1.7}
.drawer-card ul{padding-left:16px;font-size:.78rem;color:var(--text-dim);line-height:1.9}
.about-card{max-width:500px}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--purple)}
</style>
</head>

<div class="app" id="app">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-text">TRANSFORMER EXPLAINER</span>
    </div>

    <div class="controls-center">
      <select class="example-select" id="exampleSelect"></select>
      <div class="predicted-badge" id="predictedBadge">→ …</div>
    </div>

    <div class="controls-right">
      <div class="ctrl-group">
        <span>Temperature</span>
        <input type="range" id="tempSlider" min="0.1" max="2" step="0.1" value="0.8" />
        <span class="ctrl-val" id="tempVal">0.8</span>
      </div>
      <div class="ctrl-group">
        <span>Sampling</span>
        <div class="radio-row">
          <label><input type="radio" name="sampling" value="topk" checked /> Top-k</label>
          <label><input type="radio" name="sampling" value="topp" /> Top-p</label>
        </div>
        <div id="samplingControl">k=<input class="num-in" id="topKIn" type="number" min="1" max="50" value="5" /></div>
      </div>
      <button class="icon-btn" id="aboutBtn" title="About">ⓘ</button>
    </div>
  </header>

  <!-- Main Canvas -->
  <main class="canvas" id="canvas"></main>

  <!-- Remaining blocks row -->
  <section class="rem-row">
    <div class="rem-card">
      <div class="rem-title">11 more identical Transformer Blocks</div>
      <div class="rem-sub">Each processes tokens through Attention + MLP + Residuals</div>
      <div class="rem-dots" id="remDots"></div>
    </div>
  </section>

  <!-- Overlay -->
  <div class="overlay" id="overlay" style="display:none">
    <div class="drawer-card" id="drawerCard">
      <button class="drawer-close" id="drawerClose">✕</button>
      <h3 id="drawerTitle"></h3>
      <div id="drawerBody"></div>
    </div>
  </div>
</div>

function colorFromVal(v){
  if(v>0)return`rgba(139,92,246,${Math.min(1,Math.abs(v))})`;
  return`rgba(239,68,68,${Math.min(1,Math.abs(v))})`;
}
function heatColor(v){
  const i=Math.min(1,Math.abs(v));
  return v>=0?`rgba(99,179,237,${i})`:`rgba(252,129,74,${i})`;
}
function softmax(arr){
  const max=Math.max(...arr);
  const ex=arr.map(x=>Math.exp(x-max));
  const s=ex.reduce((a,b)=>a+b,0);
  return ex.map(x=>x/s);
}
function applyTemp(probs,temp){
  if(temp===1)return probs;
  const logits=probs.map(p=>Math.log(p+1e-10)/temp);
  return softmax(logits);
}
function el(tag,cls,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html!==undefined)e.innerHTML=html;
  return e;
}

function buildVCells(vals,small,expanded){
  const wrap=el('div',`v-cells`);
  vals.forEach(v=>{
    const c=el('div',`v-cell${small?' sm':''}${expanded?' exp':''}`);
    c.style.background=colorFromVal(v);
    c.title=v.toFixed(2);
    wrap.appendChild(c);
  });
  return wrap;
}

function buildEmbPanel(ex){
  const tokens=TOKENS[ex]||[];
  const embs=EMBEDDINGS[ex]||[];
  const panel=el('div','panel emb-panel');

  const hdr=el('div','p-hdr');
  hdr.innerHTML=`<span class="p-icon">⊞</span><span class="p-title">Embedding</span><span class="p-info">768-dim</span>`;
  panel.appendChild(hdr);

  const content=el('div','emb-content');
  tokens.forEach((tok,i)=>{
    const row=el('div','tok-row');
    const chip=el('div','tok-chip',tok);
    row.appendChild(chip);
    row.appendChild(buildVCells(embs[i]||[]));
    content.appendChild(row);
  });
  panel.appendChild(content);

  const foot=el('div','p-foot',`${tokens.length} tokens · 768 dims`);
  panel.appendChild(foot);
  return panel;
}

function buildAttnMatrix(ex,head){
  const tokens=TOKENS[ex]||[];
  const weights=ATTENTION[ex]||[];
  const attn=weights[head]||weights[0]||[];
  const wrap=el('div','attn-mat');

  // col labels
  const colLabels=el('div','attn-col-labels');
  colLabels.appendChild(el('div','attn-corner'));
  tokens.forEach(t=>{colLabels.appendChild(el('div','attn-cl',t))});
  wrap.appendChild(colLabels);

  attn.forEach((row,r)=>{
    const rowEl=el('div','attn-row-wrap');
    rowEl.appendChild(el('div','attn-rl',tokens[r]||''));
    row.forEach((v,c)=>{
      const cell=el('div','attn-cell');
      cell.style.background=v>0?`rgba(139,92,246,${v*.9+.05})`:'rgba(255,255,255,.03)';
      cell.title=`${tokens[r]}→${tokens[c]}: ${(v*100).toFixed(1)}%`;
      if(v>0.05)cell.textContent=Math.round(v*100);
      rowEl.appendChild(cell);
    });
    wrap.appendChild(rowEl);
  });
  return wrap;
}

function buildQKVView(ex){
  const tokens=TOKENS[ex]||[];
  const qkv=QKV[ex]||{Q:[],K:[],V:[]};
  const wrap=el('div','qkv-view');
  ['Q','K','V'].forEach(name=>{
    const grp=el('div');
    const lbl=el('div',`qkv-lbl ${name==='Q'?'q-lbl':name==='K'?'k-lbl':'v-lbl'}`,
      name==='Q'?'Query':name==='K'?'Key':'Value');

    tokens.forEach((tok,i)=>{

function updateAttnPanel(panel,ex){
  const body=panel.querySelector('.attn-body');
  body.innerHTML='';
  // sync head label
  panel.querySelector('.head-nav span').textContent=`Head ${state.activeHead+1} of 12`;
  // sync tabs
  const tabs=panel.querySelectorAll('.vtab');
  tabs[0].className=`vtab ${state.attnView==='matrix'?'on':''}`;
  tabs[1].className=`vtab ${state.attnView==='qkv'?'on':''}`;

  if(state.attnView==='matrix'){
    body.appendChild(buildAttnMatrix(ex,state.activeHead));
  } else {
    body.appendChild(buildQKVView(ex));
  }
}

let mlpPhaseTimer=null;
function buildMlpPanel(ex){
  const tokens=TOKENS[ex]||[];
  const mlp=MLP_OUT[ex]||[];
  const panel=el('div','panel mlp-panel');

  const phases=['Input','Expanded (×4)','Output'];
  const phaseCls=['ph0','ph1','ph2'];
  const dims=['768→','3072→','768'];

  const hdr=el('div','p-hdr');
  const phBadge=el('span','phase-badge '+phaseCls[state.mlpPhase],phases[state.mlpPhase]);
  hdr.innerHTML=`<span class="p-icon">⊡</span><span class="p-title">MLP</span>`;
  hdr.appendChild(phBadge);
  panel.appendChild(hdr);

  const content=el('div',null);
  content.style.cssText='display:flex;flex-direction:column;gap:4px';

  function renderRows(ph){
    content.innerHTML='';
    tokens.slice(0,mlp.length).forEach((tok,i)=>{
      const vals=mlp[i]||[];
      let displayVals=vals;
      if(ph===1){
        displayVals=[...vals,...vals.map(v=>v*.7),...vals.map(v=>-v*.3),...vals.map(v=>v*.5)].slice(0,12);
      }
      const row=el('div','tok-row');
      row.appendChild(el('div','tok-chip',tok));
      const cells=el('div','v-cells');
      displayVals.forEach(v=>{
        const c=el('div',`v-cell${ph===1?' exp':''}`);
        c.style.background=colorFromVal(v*(ph===2?1.2:1));
        c.title=v.toFixed(2);
        cells.appendChild(c);
      });
      row.appendChild(cells);
      content.appendChild(row);
    });
    phBadge.className='phase-badge '+phaseCls[ph];
    phBadge.textContent=phases[ph];

    const dimBadges=panel.querySelectorAll('.dim-b');
    dimBadges.forEach((d,i)=>{d.className=`dim-b${i===ph?' on':''}`;});
  }

  panel.appendChild(content);

  const dimRow=el('div','mlp-dims');
  dims.forEach((d,i)=>{
    const b=el('div',`dim-b${i===state.mlpPhase?' on':''}`,d);
    dimRow.appendChild(b);
  });
  panel.appendChild(dimRow);

  renderRows(state.mlpPhase);

  // Cycle phases
  if(mlpPhaseTimer)clearInterval(mlpPhaseTimer);
  mlpPhaseTimer=setInterval(()=>{
    state.mlpPhase=(state.mlpPhase+1)%3;
    renderRows(state.mlpPhase);
  },1800);

  return panel;
}

function buildOutPanel(ex){
  const raw=OUTPUT_PROBS[ex]||[];
  const nonZero=raw.filter(i=>i.p>0);
  const adjusted=applyTemp(nonZero.map(i=>i.p),state.temperature);
  const items=raw.map(item=>{
    const nz=nonZero.findIndex(n=>n.t===item.t);
    return{...item,ap:nz>=0?adjusted[nz]:0};
  });

  const panel=el('div','panel out-panel');
  const hdr=el('div','p-hdr');
  hdr.innerHTML=`<span class="p-icon">◉</span><span class="p-title">Output Probabilities</span><span class="p-info">temp=${state.temperature.toFixed(1)}</span>`;
  panel.appendChild(hdr);

  const list=el('div','out-list');
  items.slice(0,10).forEach((item,i)=>{
    const row=el('div',`out-row${i===0&&item.ap>0?' top-r':''}`);
    const tok=el('div','out-tok',item.t);
    tok.style.color=item.ap>.3?'#a78bfa':item.ap>.1?'#7c3aed':'#6b7280';
    const bwrap=el('div','out-bar-wrap');
    const bar=el('div','out-bar');
    bar.style.width=`${(item.ap*100).toFixed(1)}%`;
    bar.style.background=item.ap>.3?'linear-gradient(90deg,#7c3aed,#a78bfa)':
      item.ap>.1?'linear-gradient(90deg,#4c1d95,#7c3aed)':'rgba(255,255,255,.08)';
    bwrap.appendChild(bar);
    const pct=el('div','out-pct',item.ap>.001?`${(item.ap*100).toFixed(2)}%`:'0%');
    row.append(tok,bwrap,pct);
    list.appendChild(row);
  });
  panel.appendChild(list);

  const top=items.find(i=>i.ap>0);
  if(top){
    const box=el('div','top-pred-box');
    box.innerHTML=`Next token: <strong>"${top.t}"</strong> (${(top.ap*100).toFixed(1)}%)`;
    panel.appendChild(box);
  }
  return panel;
}

function buildFlowSVG(tokens,animated){
  const n=tokens.length;
  const h=Math.max(280,n*44);
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','50');
  svg.setAttribute('height',h);
  svg.style.overflow='visible';
  svg.style.flexShrink='0';

  tokens.forEach((_,i)=>{
    const y=22+i*44;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M0,${y} C25,${y} 25,${y} 50,${y}`);
    path.setAttribute('stroke','rgba(139,92,246,0.5)');
    path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none');
    if(animated)path.setAttribute('class','flow-path');
    svg.appendChild(path);

    if(animated){
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('r','3');
      dot.setAttribute('fill','#8b5cf6');
      dot.setAttribute('class','flow-dot');
      const anim=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      anim.setAttribute('dur',`${1.2+i*.2}s`);
      anim.setAttribute('repeatCount','indefinite');
      anim.setAttribute('path',`M0,${y} C25,${y} 25,${y} 50,${y}`);
      dot.appendChild(anim);
      svg.appendChild(dot);
    }
  });
  return svg;
}

  const embStage=el('div','stage');
  const embLabel=el('div','s-label');
  embLabel.innerHTML='Embedding <span class="ib">?</span>';
  embLabel.onclick=()=>showInfo('embedding');
  embStage.appendChild(embLabel);
  embStage.appendChild(buildEmbPanel(ex));
  canvas.appendChild(embStage);

  canvas.appendChild(buildFlowSVG(tokens,state.animBlock));

  // Transformer Block
  const blkWrap=el('div','blk-wrap');

  const blkHdr=el('div','blk-hdr');
  const prevB=el('button','nav-btn','‹');
  const blkTitle=el('span','blk-title',`Transformer Block ${state.activeBlock}`);
  const nextB=el('button','nav-btn','›');
  prevB.onclick=()=>{if(state.activeBlock>1){state.activeBlock--;blkTitle.textContent=`Transformer Block ${state.activeBlock}`;updateBlockDots();}};
  nextB.onclick=()=>{if(state.activeBlock<12){state.activeBlock++;blkTitle.textContent=`Transformer Block ${state.activeBlock}`;updateBlockDots();}};
  blkHdr.append(prevB,blkTitle,nextB);
  blkWrap.appendChild(blkHdr);

  const blkInner=el('div','blk-inner');

  // Left residual
  const resL=el('div','res-track');
  resL.innerHTML='<div class="res-tag">Residual</div><div class="res-line"></div>';
  blkInner.appendChild(resL);

  // Attention + MLP stack
  const stack=el('div','attn-mlp-stack');
  const attnLabel=el('div','s-label');
  attnLabel.innerHTML='Multi-Head Self Attention <span class="ib">?</span>';
  attnLabel.onclick=()=>showInfo('attention');
  stack.appendChild(attnLabel);

  const attnPanel=buildAttnPanel(ex);
  stack.appendChild(attnPanel);

  const mlpLabel=el('div','s-label');
  mlpLabel.innerHTML='MLP <span class="ib">?</span>';
  mlpLabel.onclick=()=>showInfo('mlp');
  stack.appendChild(mlpLabel);
  stack.appendChild(buildMlpPanel(ex));
  blkInner.appendChild(stack);

  // Right residual
  const resR=el('div','res-track');
  resR.innerHTML='<div class="res-tag">Residual</div><div class="res-line"></div>';
  blkInner.appendChild(resR);
  blkWrap.appendChild(blkInner);

  // Block badge
  const badge=el('div','blk-badge');
  const badgeInner=el('div','');
  badgeInner.style.cssText='display:flex;align-items:baseline;gap:4px';
  badgeInner.innerHTML=`<span class="blk-num" id="blkNum">${state.activeBlock}</span><span class="blk-lbl">/ 12 Transformer Blocks</span>`;
  badge.appendChild(badgeInner);
  const dotsWrap=el('div','blk-dots',);
  dotsWrap.id='blkDots';
  for(let i=0;i<12;i++){
    const d=el('div',`blk-dot${i<state.activeBlock?' on':''}`);
    dotsWrap.appendChild(d);
  }
  badge.appendChild(dotsWrap);
  blkWrap.appendChild(badge);
  canvas.appendChild(blkWrap);

  canvas.appendChild(buildFlowSVG(tokens,state.animBlock));

  // Post-block MLP stage
  const mlpStage=el('div','stage');
  mlpStage.appendChild(el('div','s-label','Post-Block Output'));
  mlpStage.appendChild(buildMlpPanel(ex));
  canvas.appendChild(mlpStage);

  canvas.appendChild(buildFlowSVG(tokens,state.animBlock));

  // Output stage
  const outStage=el('div','stage output-stage');
  const outLabel=el('div','s-label');
  outLabel.innerHTML='Probabilities <span class="ib">?</span>';
  outLabel.onclick=()=>showInfo('output');
  outStage.appendChild(outLabel);
  outStage.appendChild(buildOutPanel(ex));
  canvas.appendChild(outStage);

  // Remaining blocks dots
  const remDots=document.getElementById('remDots');
  remDots.innerHTML='';
  for(let i=0;i<11;i++){
    const d=el('div','rem-dot');
    d.style.animationDelay=`${i*.1}s`;
    remDots.appendChild(d);
  }
}

function updateBlockDots(){
  const dotsWrap=document.getElementById('blkDots');
  const numEl=document.getElementById('blkNum');
  if(dotsWrap){
    dotsWrap.querySelectorAll('.blk-dot').forEach((d,i)=>{
      d.className=`blk-dot${i<state.activeBlock?' on':''}`;
    });
  }
  if(numEl)numEl.textContent=state.activeBlock;
}

function animateBlockEntry(){
  state.animBlock=true;
  state.activeBlock=0;
  if(blockAnimTimer)clearInterval(blockAnimTimer);
  blockAnimTimer=setInterval(()=>{
    state.activeBlock=Math.min(12,state.activeBlock+1);
    const dotsWrap=document.getElementById('blkDots');
    const numEl=document.getElementById('blkNum');
    if(dotsWrap){
      dotsWrap.querySelectorAll('.blk-dot').forEach((d,i)=>{
        d.className=`blk-dot${i<state.activeBlock?' on':''}`;
      });
    }
    if(numEl)numEl.textContent=state.activeBlock;
    if(state.activeBlock>=12){
      clearInterval(blockAnimTimer);
      state.animBlock=false;
    }
  },120);
}

// ══════════════════════════════════════════════════════════
// INFO / OVERLAY
// ══════════════════════════════════════════════════════════
function showInfo(topic){
  const info=INFO[topic];
  if(!info)return;
  document.getElementById('drawerTitle').textContent=info.title;
  document.getElementById('drawerBody').innerHTML=info.body;
  document.getElementById('overlay').style.display='flex';
}
function hideInfo(){document.getElementById('overlay').style.display='none';}

// ══════════════════════════════════════════════════════════
// INIT CONTROLS
// ══════════════════════════════════════════════════════════
function initControls(){
  // Populate example select
  const sel=document.getElementById('exampleSelect');
  EXAMPLES.forEach(ex=>{
    const opt=document.createElement('option');
    opt.value=ex;opt.textContent=ex;
    sel.appendChild(opt);
  });
  sel.value=state.example;
  sel.onchange=()=>{
    state.example=sel.value;
    state.activeHead=0;
    state.attnView='matrix';
    state.mlpPhase=0;
    updatePredictedBadge();
    renderCanvas();
    animateBlockEntry();
  };

  updatePredictedBadge();

  // Temperature
  const tempSlider=document.getElementById('tempSlider');
  const tempVal=document.getElementById('tempVal');
  tempSlider.value=state.temperature;
  tempSlider.oninput=()=>{
    state.temperature=parseFloat(tempSlider.value);
    tempVal.textContent=state.temperature.toFixed(1);
    // re-render output panel only
    renderCanvas();
  };

  // Sampling
  document.querySelectorAll('input[name=sampling]').forEach(r=>{
    r.onchange=()=>{
      state.sampling=r.value;
      const ctrl=document.getElementById('samplingControl');
      ctrl.innerHTML=state.sampling==='topk'
        ?`k=<input class="num-in" id="topKIn" type="number" min="1" max="50" value="${state.topK}">`
        :`p=<input class="num-in" id="topPIn" type="number" min="0.1" max="1" step="0.05" value="${state.topP}">`;
      attachNumInputs();
    };
  });
  attachNumInputs();

  // About
  document.getElementById('aboutBtn').onclick=()=>showInfo('about');
  document.getElementById('drawerClose').onclick=hideInfo;
  document.getElementById('overlay').onclick=(e)=>{if(e.target===e.currentTarget)hideInfo();};
}

function attachNumInputs(){
  const ki=document.getElementById('topKIn');
  if(ki)ki.oninput=()=>{state.topK=parseInt(ki.value)||5;};
  const pi=document.getElementById('topPIn');
  if(pi)pi.oninput=()=>{state.topP=parseFloat(pi.value)||0.9;};
}

function updatePredictedBadge(){
  const top=OUTPUT_PROBS[state.example]?.[0];
  document.getElementById('predictedBadge').textContent=top?`→ "${top.t}"`:'→ …';
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  initControls();
  renderCanvas();
  animateBlockEntry();
});
</script>
</body>
</html>
